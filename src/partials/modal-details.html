<div class="movie-modal is-hidden" data-movie-modal>
  <div class="movie-modal__overlay" data-movie-modal-overlay></div>

  <div
    class="movie-modal__window"
    role="dialog"
    aria-modal="true"
    aria-labelledby="movie-modal-title"
  >
    <button
      class="movie-modal__close"
      type="button"
      aria-label="Close modal"
      data-movie-modal-close
    >
      <svg
        width="14"
        height="14"
        viewBox="0 0 14 14"
        fill="none"
        aria-hidden="true"
      >
        <path
          d="M1 1L13 13M13 1L1 13"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
        />
      </svg>
    </button>

    <div class="movie-modal__content" data-movie-modal-content>
      <p class="movie-modal__loading">Loading...</p>
    </div>
  </div>
</div>
