<div class="trailer-modal is-hidden" data-trailer-modal>
  <div class="trailer-modal__overlay" data-trailer-overlay></div>

  <div
    class="trailer-modal__window"
    role="dialog"
    aria-modal="true"
    aria-label="Movie trailer"
  >
    <button
      class="trailer-modal__close"
      type="button"
      aria-label="Close trailer"
      data-trailer-close
    >
      <svg
        width="14"
        height="14"
        viewBox="0 0 14 14"
        fill="none"
        aria-hidden="true"
      >
        <path
          d="M1 1L13 13M13 1L1 13"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
        />
      </svg>
    </button>

    <div class="trailer-modal__player">
      <p class="trailer-modal__status" data-trailer-status>
        Loading trailer...
      </p>

      <div class="trailer-modal__error" data-trailer-error hidden>
        <div class="trailer-modal__error-copy">
          <h2>OOPS...</h2>
          <p>We are very sorry!</p>
          <p>But we couldn't find the trailer.</p>
        </div>

        <img
          class="trailer-modal__error-image"
          src="./src/img/trailer-not-found.png"
          alt="Cinema clapperboard, film reel and 3D glasses"
        />
      </div>

      <iframe
        class="trailer-modal__frame"
        data-trailer-frame
        title="Movie trailer"
        allow="autoplay; encrypted-media; picture-in-picture"
        allowfullscreen
        hidden
      ></iframe>
    </div>
  </div>
</div>
