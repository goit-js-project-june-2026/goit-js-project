<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Search Bar — Cinemania</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="search-input.css" />
  </head>
  <body>
    <div class="preview-page">
      <form class="search-bar" role="search" novalidate>
        <div class="search-bar-input-wrap" data-field="film">
          <label for="search-film" class="visually-hidden"
            >Search by film title</label
          >
          <input
            type="text"
            id="search-film"
            name="film"
            class="search-bar-input"
            placeholder="Film"
            autocomplete="off"
          />

          <button
            type="button"
            class="search-bar-clear"
            aria-label="Clear film input"
          >
            <svg
              width="10"
              height="10"
              viewBox="0 0 10 10"
              fill="none"
              aria-hidden="true"
            >
              <path
                d="M1 1L9 9M9 1L1 9"
                stroke="currentColor"
                stroke-width="1.8"
                stroke-linecap="round"
              />
            </svg>
          </button>
        </div>

        <div class="search-bar-year" data-field="year">
          <button
            type="button"
            class="search-bar-year-btn"
            aria-haspopup="listbox"
            aria-expanded="false"
            aria-controls="year-listbox"
            aria-label="Filter by year"
          >
            <span class="search-bar-year-value">Year</span>
            <svg
              class="search-bar-chevron"
              width="12"
              height="7"
              viewBox="0 0 12 7"
              fill="none"
              aria-hidden="true"
            >
              <path
                d="M1 1L6 6L11 1"
                stroke="currentColor"
                stroke-width="1.5"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
          </button>

          <ul
            id="year-listbox"
            class="search-bar-year-list"
            role="listbox"
            aria-label="Select year"
          >
            <li class="search-bar-year-item" role="option" data-value="2023">
              2023
            </li>
            <li class="search-bar-year-item" role="option" data-value="2022">
              2022
            </li>
            <li class="search-bar-year-item" role="option" data-value="2021">
              2021
            </li>
            <li class="search-bar-year-item" role="option" data-value="2020">
              2020
            </li>

            <li
              class="search-bar-year-item search-bar-year-item--selected"
              role="option"
              data-value="2019"
              aria-selected="true"
            >
              2019
            </li>
            <li class="search-bar-year-item" role="option" data-value="2018">
              2018
            </li>
            <li class="search-bar-year-item" role="option" data-value="2017">
              2017
            </li>
            <li class="search-bar-year-item" role="option" data-value="2016">
              2016
            </li>
            <li class="search-bar-year-item" role="option" data-value="2015">
              2015
            </li>
          </ul>
        </div>

        <div
          class="search-bar-input-wrap search-bar-input-wrap--mobile-only"
          data-field="search"
        >
          <label for="search-query" class="visually-hidden">Search</label>
          <input
            type="text"
            id="search-query"
            name="query"
            class="search-bar-input"
            placeholder="Search"
            autocomplete="off"
          />
        </div>

        <button
          type="submit"
          class="search-bar-submit"
          aria-label="Submit search"
        >
          <svg
            width="20"
            height="20"
            viewBox="0 0 20 20"
            fill="none"
            aria-hidden="true"
          >
            <circle
              cx="8.5"
              cy="8.5"
              r="6.5"
              stroke="white"
              stroke-width="1.8"
            />
            <path
              d="M13.5 13.5L18.5 18.5"
              stroke="white"
              stroke-width="1.8"
              stroke-linecap="round"
            />
          </svg>
        </button>
      </form>

      <div
        class="no-results is-hidden"
        role="status"
        aria-live="polite"
        aria-atomic="true"
      >
        <p class="no-results-oops">OOPS...</p>
        <p class="no-results-sorry">We are very sorry!</p>
        <p class="no-results-msg">
          We don't have any results matching your search.
        </p>
      </div>
    </div>
  </body>
</html>
